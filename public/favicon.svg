<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 32 32">
  <style>
    .dark { display: none; }
    .light { display: block; }
    @media (prefers-color-scheme: dark) {
      .dark { display: block; }
      .light { display: none; }
    }
  </style>
  <image class="light" width="32" height="32" href="data:image/png;base64," />
  <image class="dark" width="32" height="32" href="data:image/png;base64," />
</svg>
